codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

ignore:
  - "magefile.go"
  - "tools.go"
  - "internal/**"
  - "tests/**"
  - "vendor/**"
  - "hack/**"
  - "docs/**"
  - "squid/**"

flags:
  unit-tests:
    carryforward: true
  e2e-tests:
    carryforward: true

comment:
  layout: "reach,diff,flags,files,footer"
  require_changes: true
