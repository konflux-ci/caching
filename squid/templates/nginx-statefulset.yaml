{{- if .Values.nginx.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.nginx.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "nginx.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Values.nginx.name }}-headless
  replicas: {{ .Values.nginx.replicaCount }}
  minReadySeconds: 30
  selector:
    matchLabels:
      {{- include "nginx.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Config checksum to trigger redeployment on config changes
        checksum/config: {{ include (print $.Template.BasePath "/nginx-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "nginx.selectorLabels" . | nindent 8 }}
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "nginx.selectorLabels" . | nindent 14 }}
      {{- if hasKey .Values.nginx "affinity" }}
      {{- with .Values.nginx.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- else }}
      affinity:
        {{- include "nginx.defaultAffinity" . | nindent 8 }}
      {{- end }}
      {{- with .Values.nginx.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: init-config
          image: {{ .Values.nginx.image }}
          command: ['sh', '-c']
          args:
            - |
              set -e
              RESOLVER=$(awk '/^nameserver/{print $2; exit}' /etc/resolv.conf)
              sed -e "s|__RESOLVER__|${RESOLVER}|g" \
              {{- if .Values.nginx.auth.enabled }}
                  -e "s|__AUTH_HEADER__|$(cat /secrets/authorization)|g" \
              {{- end }}
                  /config-template/nginx.conf > /config/nginx.conf
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 10m
              memory: 32Mi
          securityContext:
            {{- toYaml .Values.nginx.securityContext | nindent 12 }}
          volumeMounts:
            - name: config-template
              mountPath: /config-template
              readOnly: true
            - name: config
              mountPath: /config
            {{- if .Values.nginx.auth.enabled }}
            - name: auth-secret
              mountPath: /secrets
              readOnly: true
            {{- end }}
      containers:
        - name: nginx
          image: {{ .Values.nginx.image }}
          command: ["nginx"]
          args: ["-e", "/dev/stderr", "-g", "daemon off;"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- if .Values.nginx.tls.enabled }}
            - name: https
              containerPort: 8443
              protocol: TCP
            {{- end }}
            - name: metrics
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              {{- if .Values.nginx.tls.enabled }}
              port: https
              scheme: HTTPS
              {{- else }}
              port: http
              {{- end }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              {{- if .Values.nginx.tls.enabled }}
              port: https
              scheme: HTTPS
              {{- else }}
              port: http
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.nginx.securityContext | nindent 12 }}
          volumeMounts:
            - name: cache
              mountPath: /var/cache/nginx
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run
            {{- if .Values.nginx.tls.enabled }}
            - name: tls
              mountPath: /etc/nginx/tls
              readOnly: true
            {{- end }}
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
        {{- if .Values.nginx.exporter.enabled }}
        # Access-log-exporter sidecar: exposes Prometheus metrics from NGINX access logs
        - name: access-log-exporter
          image: {{ include "nginx.exporter.image" . }}
          imagePullPolicy: {{ .Values.nginx.exporter.imagePullPolicy | default "IfNotPresent" }}
          args:
            - "--config=/etc/exporter/config.yaml"
          ports:
            - name: metrics
              containerPort: {{ .Values.nginx.exporter.port }}
              protocol: TCP
          {{- if .Values.nginx.exporter.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.nginx.exporter.metricsPath }}
              port: metrics
            initialDelaySeconds: {{ .Values.nginx.exporter.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.nginx.exporter.livenessProbe.periodSeconds }}
          {{- end }}
          {{- if .Values.nginx.exporter.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.nginx.exporter.metricsPath }}
              port: metrics
            initialDelaySeconds: {{ .Values.nginx.exporter.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.nginx.exporter.readinessProbe.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.nginx.exporter.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.nginx.exporter.securityContext | nindent 12 }}
          volumeMounts:
            - name: exporter-config
              mountPath: /etc/exporter
              readOnly: true
            - name: tmp
              mountPath: /tmp
        {{- end }}
      volumes:
        - name: config-template
          configMap:
            name: {{ .Values.nginx.name }}-config
        {{- if .Values.nginx.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.nginx.tls.secretName }}
        {{- end }}
        - name: config
          emptyDir: {}
        {{- if .Values.nginx.auth.enabled }}
        - name: auth-secret
          secret:
            secretName: {{ .Values.nginx.auth.secretName }}
        {{- end }}
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.nginx.tmpVolumeSizeLimit | default "100Mi" }}
        - name: run
          emptyDir: {}
        {{- if .Values.nginx.exporter.enabled }}
        - name: exporter-config
          configMap:
            name: {{ .Values.nginx.name }}-exporter-config
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: cache
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.nginx.cache.size }}Mi
{{- end }}
