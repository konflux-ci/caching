apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "squid.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "squid.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "squid.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "squid.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "squid.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: squid
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3128
              protocol: TCP
            {{- if .Values.squidExporter.enabled }}
            - name: metrics
              containerPort: {{ .Values.squidExporter.port }}
              protocol: TCP
            {{- end }}
          {{- if .Values.squidExporter.enabled }}
          command: ["/bin/sh"]
          args:
            - -c
            - |
              # Start squid-exporter in background
              /usr/local/bin/squid-exporter \
                -squid-hostname localhost \
                -squid-port {{ .Values.service.port }} \
                -listen :{{ .Values.squidExporter.port }} \
                -metrics-path {{ .Values.squidExporter.metricsPath }} \
                {{- if .Values.squidExporter.squidLogin }}
                -squid-login "{{ .Values.squidExporter.squidLogin }}" \
                {{- end }}
                {{- if .Values.squidExporter.squidPassword }}
                -squid-password "{{ .Values.squidExporter.squidPassword }}" \
                {{- end }}
                {{- range $key, $value := .Values.squidExporter.customLabels }}
                -label "{{ $key }}={{ $value }}" \
                {{- end }}
                &
              
              # Start squid and pipe access logs to squid-exporter via stdin
              exec /usr/sbin/container-entrypoint.sh
          {{- end }}
          livenessProbe:
            tcpSocket:
              port: http
          readinessProbe:
            tcpSocket:
              port: http
          {{- if .Values.squidExporter.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.squidExporter.metricsPath }}
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: squid-config
              mountPath: /etc/squid/squid.conf
              subPath: squid.conf

      volumes:
        - name: squid-config
          configMap:
            name: {{ include "squid.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
