apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/konflux-ci/caching?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
  labels:
    appstudio.openshift.io/application: caching
    appstudio.openshift.io/component: squid
    pipelines.appstudio.openshift.io/type: test
  name: caching-openshift-e2e-tests
  namespace: konflux-vanguard-tenant
spec:
  params:
    - name: ocp-version
      value: "4.17"
    - name: test-event-type
      value: pull_request
    - name: machine-type
      value: m5.xlarge

  pipelineSpec:
    description: |-
      This pipeline automates the process of running end-to-end tests for Squid
      on an ephemeral OpenShift cluster provisioned via OpenShift CI.
      It runs on pull_request events and uses PR build images directly.
    params:
      - name: SNAPSHOT
        description: 'JSON string containing the application components and their container images'
        default: '{"components": []}'
        type: string
      - name: ocp-version
        description: 'The OpenShift version to use for the ephemeral cluster deployment.'
        type: string
        default: "4.17"
      - name: test-event-type
        description: 'Indicates if the test is triggered by a Pull Request or Push event.'
        default: 'pull_request'
      - name: machine-type
        description: 'The EC2 instance type for cluster worker nodes (amd64 or arm64).'
        type: string
        default: "m5.xlarge"
      - name: helm-version
        description: 'The Helm version to install and use for deployments.'
        type: string
        default: "3.20.1"

    tasks:
      - name: test-metadata
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/konflux-ci/tekton-integration-catalog.git
            - name: revision
              value: main
            - name: pathInRepo
              value: tasks/test-metadata/0.4/test-metadata.yaml
        params:
          - name: SNAPSHOT
            value: $(params.SNAPSHOT)

      # Extract component images from the snapshot
      # The snapshot contains all built component images for this PR
      - name: extract-snapshot-images
        runAfter:
          - test-metadata
        taskSpec:
          params:
            - name: SNAPSHOT
              type: string
          results:
            - name: squid-image
              description: Container image for the squid component
            - name: squid-tester-image
              description: Container image for the squid-tester component
          steps:
            - name: extract
              image: quay.io/konflux-ci/konflux-test:v1.4.52@sha256:deabe80a01dca3a8a0edb709324e30cbf0baa176f7a181bbb695323f506f7aac
              script: |
                #!/bin/bash
                set -euo pipefail
                
                echo "Extracting component images from snapshot..."
                snapshot='$(params.SNAPSHOT)'
                echo "Snapshot: $snapshot"
                
                # Extract squid image
                squid_image=$(echo "$snapshot" | jq -r '.components[] | select(.name == "squid") | .containerImage')
                if [ -z "$squid_image" ] || [ "$squid_image" = "null" ]; then
                  echo "ERROR: Could not find squid component in snapshot"
                  exit 1
                fi
                echo "Squid image: $squid_image"
                echo -n "$squid_image" > $(results.squid-image.path)
                
                # Extract squid-tester image
                tester_image=$(echo "$snapshot" | jq -r '.components[] | select(.name == "squid-tester") | .containerImage')
                if [ -z "$tester_image" ] || [ "$tester_image" = "null" ]; then
                  echo "ERROR: Could not find squid-tester component in snapshot"
                  exit 1
                fi
                echo "Tester image: $tester_image"
                echo -n "$tester_image" > $(results.squid-tester-image.path)
        params:
          - name: SNAPSHOT
            value: $(params.SNAPSHOT)

      # Construct the PR event data needed by the provision task.
      # The reconciler needs org/repo/PR to fetch PR metadata from GitHub.
      # PaC template variables ({{ body }}/{{ headers }}) are not resolved
      # when the integration service creates the PipelineRun, so we construct
      # the payload from the SNAPSHOT and PipelineRun annotations instead.
      - name: build-pr-event
        runAfter:
          - test-metadata
        taskSpec:
          results:
            - name: pr-event-payload
            - name: pr-event-headers
          steps:
            - name: build
              image: quay.io/konflux-ci/konflux-test:v1.4.52@sha256:deabe80a01dca3a8a0edb709324e30cbf0baa176f7a181bbb695323f506f7aac
              env:
                - name: GROUP_TEST_INFO
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['test.appstudio.openshift.io/group-test-info']
              script: |
                #!/bin/bash
                set -euo pipefail

                repo_url=$(echo "$GROUP_TEST_INFO" | jq -r '.[0].repoUrl // empty')
                pr_number=$(echo "$GROUP_TEST_INFO" | jq -r '.[0].pullRequestNumber // empty')

                if [ -z "$repo_url" ] || [ -z "$pr_number" ]; then
                  echo "ERROR: Could not extract repoUrl or pullRequestNumber from group-test-info"
                  echo "group-test-info: $GROUP_TEST_INFO"
                  exit 1
                fi

                repo_path=$(echo "$repo_url" | sed 's|https://github.com/||; s|\.git$||')

                # The reconciler expects valid JSON for the payload. It first
                # unmarshals into PullRequestEvent (pull_request will be null),
                # then falls back to regex-matching /org/repo/pulls/NUMBER from
                # the raw string to fetch PR metadata via the GitHub API.
                payload="{\"pr_url\": \"/${repo_path}/pulls/${pr_number}\"}"
                headers="{\"X-Github-Delivery\": \"$(cat /proc/sys/kernel/random/uuid)\"}"

                echo "PR event payload: $payload"
                echo "PR event headers: $headers"
                echo -n "$payload" > $(results.pr-event-payload.path)
                echo -n "$headers" > $(results.pr-event-headers.path)

      # Provision ephemeral cluster via OpenShift CI
      - name: provision-ephemeral-cluster
        when:
          - input: "$(tasks.test-metadata.results.test-event-type)"
            operator: in
            values: ["pull_request", "push", ""]
        runAfter:
          - build-pr-event
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/amisstea/konflux-tasks
            - name: revision
              value: KFLUXVNGD-836
            - name: pathInRepo
              value: tasks/provision-ephemeral-cluster/0.1/provision-ephemeral-cluster.yaml
        params:
          - name: ownerName
            value: $(context.pipelineRun.name)
          - name: ownerUid
            value: $(context.pipelineRun.uid)
          - name: prEventPayload
            value: $(tasks.build-pr-event.results.pr-event-payload)
          - name: prEventHeaders
            value: $(tasks.build-pr-event.results.pr-event-headers)
          - name: workflow
            value: hypershift-hostedcluster-workflow
          - name: env
            value: '{"COMPUTE_NODE_TYPE": "$(params.machine-type)", "HYPERSHIFT_NODE_COUNT": "3"}'
          - name: releases
            value: |
              {"latest":{"release":{"channel":"stable","version":"$(params.ocp-version)","architecture":"multi"}}}
          - name: timeout
            value: 30m

      # Create namespace on the ephemeral cluster for secret copying and deployment
      - name: create-namespace
        when:
          - input: "$(tasks.test-metadata.results.test-event-type)"
            operator: in
            values: ["pull_request", "push", ""]
        runAfter:
          - provision-ephemeral-cluster
        taskSpec:
          params:
            - name: clusterCredentialsSecretRef
          steps:
            - name: create-namespace
              image: quay.io/konflux-ci/konflux-test:v1.4.52@sha256:deabe80a01dca3a8a0edb709324e30cbf0baa176f7a181bbb695323f506f7aac
              env:
                - name: KUBECONFIG_VALUE
                  valueFrom:
                    secretKeyRef:
                      name: $(params.clusterCredentialsSecretRef)
                      key: kubeconfig
              script: |
                #!/bin/bash
                set -euo pipefail
                KUBECONFIG="$(mktemp /tmp/kubeconfig.XXXXX)"
                echo "$KUBECONFIG_VALUE" >"$KUBECONFIG"
                export KUBECONFIG
                echo "Creating caching namespace on ephemeral cluster..."

                cat <<EOF | oc apply -f -
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: caching
                  labels:
                    app.kubernetes.io/managed-by: Helm
                  annotations:
                    meta.helm.sh/release-name: squid
                    meta.helm.sh/release-namespace: default
                EOF

                echo "Namespace created with Helm ownership labels"
        params:
          - name: clusterCredentialsSecretRef
            value: $(tasks.provision-ephemeral-cluster.results.secretRef)

      # Copy secrets from Konflux namespace to the ephemeral cluster
      - name: copy-secrets
        when:
          - input: "$(tasks.test-metadata.results.test-event-type)"
            operator: in
            values: ["pull_request", "push", ""]
        runAfter:
          - create-namespace
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/amisstea/konflux-tasks
            - name: revision
              value: KFLUXVNGD-836
            - name: pathInRepo
              value: tasks/copy-secrets-to-ephemeral-cluster/0.1/copy-secrets-to-ephemeral-cluster.yaml
        params:
          - name: clusterCredentialsSecretRef
            value: $(tasks.provision-ephemeral-cluster.results.secretRef)
          - name: namespace
            value: caching
          - name: labelSelector
            value: "appstudio.redhat.com/internal=true"

      # Run E2E tests
      - name: e2e-tests
        timeout: 2h
        when:
          - input: "$(tasks.test-metadata.results.test-event-type)"
            operator: in
            values: ["pull_request", "push", ""]
        runAfter:
          - copy-secrets
          - extract-snapshot-images
        taskSpec:
          params:
            - name: squid-image
            - name: tester-image
            - name: git-url
            - name: git-revision
            - name: helm-version
            - name: clusterCredentialsSecretRef
          steps:
            - name: deploy-and-test
              image: quay.io/konflux-ci/konflux-test:v1.4.52@sha256:deabe80a01dca3a8a0edb709324e30cbf0baa176f7a181bbb695323f506f7aac
              env:
                - name: KUBECONFIG_VALUE
                  valueFrom:
                    secretKeyRef:
                      name: $(params.clusterCredentialsSecretRef)
                      key: kubeconfig
              script: |
                #!/bin/bash
                set -euo pipefail

                KUBECONFIG="$(mktemp /tmp/kubeconfig.XXXXX)"
                echo "$KUBECONFIG_VALUE" >"$KUBECONFIG"
                export KUBECONFIG

                echo "Using kubeconfig at: $KUBECONFIG"
                
                # Install helm with pinned version
                HELM_VERSION="$(params.helm-version)"
                echo "Installing Helm ${HELM_VERSION}..."
                curl -fsSL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o helm.tgz
                tar -xzf helm.tgz
                mv linux-amd64/helm /usr/local/bin/helm
                rm -rf helm.tgz linux-amd64
                helm version
                
                # Verify cluster access
                echo "Verifying OpenShift cluster..."
                oc version
                oc auth can-i create customresourcedefinitions || echo "WARNING: No CRD permissions"
                oc auth can-i '*' '*' --all-namespaces && echo "Confirmed: cluster-admin access" || echo "WARNING: Limited permissions"
                
                echo "Cloning repository..."
                git clone $(params.git-url) /workspace/source
                cd /workspace/source
                git checkout $(params.git-revision)
                
                # Use default namespace for Helm release (matches magefile.go behavior)
                # Resources will be created in "caching" namespace (from chart's values.yaml default)
                namespace="default"
                
                # Check for image pull secrets in the resource namespace
                echo "Checking for image pull secrets in caching namespace..."
                pull_secrets=$(oc get secrets -n "caching" -o json | \
                  jq -r '.items[] | select(.type=="kubernetes.io/dockerconfigjson") | .metadata.name' 2>/dev/null || echo "")
                
                if [ -n "$pull_secrets" ]; then
                  echo "Found $(echo "$pull_secrets" | wc -w) image pull secret(s)"
                  secret_args=""
                  idx=0
                  for secret in $pull_secrets; do
                    secret_args="$secret_args --set imagePullSecrets[$idx].name=$secret"
                    idx=$((idx + 1))
                  done
                else
                  echo "WARNING: No image pull secrets found"
                  secret_args=""
                fi
                
                # Prepare Helm chart with cert-manager dependency
                echo "Adding jetstack Helm repository..."
                helm repo add jetstack https://charts.jetstack.io 2>/dev/null || true
                helm repo update
                cd squid
                helm dependency build
                
                # Parse image references
                squid_img="$(params.squid-image)"
                squid_repo="${squid_img%:*}"
                squid_tag="${squid_img##*:}"
                
                tester_img="$(params.tester-image)"
                tester_repo="${tester_img%:*}"
                tester_tag="${tester_img##*:}"
                
                echo "Squid: $squid_repo:$squid_tag"
                echo "Tester: $tester_repo:$tester_tag"
                
                # Install squid with bundled cert-manager, overriding runAsUser to be OpenShift SCC compatible
                # OpenShift's restricted-v2 SCC requires UIDs in namespace-specific ranges (e.g., 1000740000-1000749999)
                # By not specifying runAsUser/runAsGroup/fsGroup, OpenShift will auto-assign from the allowed range
                # Note: Using installCRDs=false to let squid/crds/ directory handle CRDs (avoids ownership conflicts)
                echo "Installing Squid chart with cert-manager..."
                helm install squid . \
                  --namespace "$namespace" \
                  --set environment=prerelease \
                  --set envSettings.prerelease.squid.image.repository="$squid_repo" \
                  --set envSettings.prerelease.squid.image.tag="$squid_tag" \
                  --set envSettings.prerelease.test.image.repository="$tester_repo" \
                  --set envSettings.prerelease.test.image.tag="$tester_tag" \
                  --set mirrord.enabled=false \
                  --set installCertManagerComponents=true \
                  --set cert-manager.enabled=true \
                  --set cert-manager.installCRDs=false \
                  --set cert-manager.securityContext.runAsUser=null \
                  --set cert-manager.securityContext.runAsGroup=null \
                  --set cert-manager.securityContext.fsGroup=null \
                  --set nexus.securityContext.runAsUser=null \
                  --set nginx.enabled=true \
                  $secret_args \
                  --wait \
                  --timeout=5m \
                  --debug
                
                echo "Squid deployed successfully!"
                
                echo "Running Helm tests..."
                if ! helm test squid --namespace "$namespace" --timeout 90m; then
                  echo "ERROR: Helm test failed!"
                  echo "=== squid-test pod logs (failure) ==="
                  oc logs -n "caching" squid-test --tail=2000 2>&1 || true
                  exit 1
                fi
                
                echo "Helm tests succeeded, capturing squid-test logs for diagnostics..."
                echo "=== squid-test pod logs (success) ==="
                oc logs -n "caching" squid-test --tail=2000 2>&1 || true
                
                echo "All E2E tests passed!"
        params:
          - name: squid-image
            value: "$(tasks.extract-snapshot-images.results.squid-image)"
          - name: tester-image
            value: "$(tasks.extract-snapshot-images.results.squid-tester-image)"
          - name: git-url
            value: "$(tasks.test-metadata.results.git-url)"
          - name: git-revision
            value: "$(tasks.test-metadata.results.git-revision)"
          - name: helm-version
            value: "$(params.helm-version)"
          - name: clusterCredentialsSecretRef
            value: "$(tasks.provision-ephemeral-cluster.results.secretRef)"

    finally:
      - name: deprovision-ephemeral-cluster
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/openshift/konflux-tasks
            - name: revision
              value: main
            - name: pathInRepo
              value: tasks/deprovision-ephemeral-cluster/0.1/deprovision-ephemeral-cluster.yaml
        params:
          - name: testPlatformClusterClaimName
            value: $(tasks.provision-ephemeral-cluster.results.testPlatformClusterClaimName)
          - name: testPlatformClusterClaimNamespace
            value: $(tasks.provision-ephemeral-cluster.results.testPlatformClusterClaimNamespace)
