name: AGENTS.md lint

on:
  pull_request:
    paths:
      - AGENTS.md
  push:
    branches: [main]
    paths:
      - AGENTS.md

jobs:
  check-line-count:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate AGENTS.md is under 60 lines
        run: |
          MAX_LINES=60
          LINES=$(grep -c '' AGENTS.md)
          echo "AGENTS.md has $LINES lines (max: $MAX_LINES)"
          if [ "$LINES" -ge "$MAX_LINES" ]; then
            echo "::error file=AGENTS.md::AGENTS.md must be under $MAX_LINES lines ($LINES lines). Keep it concise."
            exit 1
          fi
