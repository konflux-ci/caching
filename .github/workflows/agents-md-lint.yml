name: AGENTS.md lint

on:
  pull_request:
    paths:
      - AGENTS.md
  push:
    branches: [main]
    paths:
      - AGENTS.md

permissions:
  contents: read

jobs:
  check-line-count:
    name: Check AGENTS.md line limit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate AGENTS.md
        run: |
          MAX_LINES=300
          ACTUAL_LINES=$(wc -l < AGENTS.md)
          echo "AGENTS.md has $ACTUAL_LINES lines (max: $MAX_LINES)"
          if [ "$ACTUAL_LINES" -gt "$MAX_LINES" ]; then
            echo "::error file=AGENTS.md::AGENTS.md has $ACTUAL_LINES lines, must be <= $MAX_LINES"
            exit 1
          fi
