name: Go Lint

on:
  push:
    branches: ["main"]
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        run: make lint
